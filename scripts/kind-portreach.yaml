# kind cluster for portreach chart smoke-testing.
# The point: a DNS domain that is NOT cluster.local, plus >1 worker node, so the
# agent DaemonSet fans out and the UI's agent discovery is exercised the way it
# is on real corporate clusters (e.g. Acme's kube-dev.corp.example).
#
#   kind create cluster --name portreach-smoke --config scripts/kind-portreach.yaml
#
# kind has no networking.dnsDomain field — the cluster domain is set via kubeadm
# patches: ClusterConfiguration.networking.dnsDomain (drives CoreDNS) and
# KubeletConfiguration.clusterDomain (drives pod resolv.conf search domains).
# Keep both in sync with DOMAIN in scripts/chart-smoke.sh.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
kubeadmConfigPatches:
  - |
    kind: ClusterConfiguration
    networking:
      dnsDomain: corp.test          # <-- deliberately not cluster.local
  - |
    kind: KubeletConfiguration
    clusterDomain: corp.test
nodes:
  - role: control-plane
  - role: worker
  - role: worker                     # two workers => DaemonSet schedules two agents
