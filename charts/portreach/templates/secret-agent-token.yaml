{{- /*
Shared agent bearer token (Boundary B). Rendered only for a literal
`agent.auth.token`; an `agent.auth.existingSecret` is referenced as-is and
rotated out of band (manual rollout — there is no checksum annotation for it).
The same Secret is mounted by both the agent DaemonSet and the UI Deployment.
*/ -}}
{{- if and .Values.agent.auth.token (not .Values.agent.auth.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "portreach.agent.token.secretName" . }}
  labels:
    {{- include "portreach.agent.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  {{ .Values.agent.auth.tokenSecretKey }}: {{ .Values.agent.auth.token | quote }}
{{- end }}
