{{- if and .Values.ui.enabled (eq (include "portreach.auth.enabled" .) "true") -}}
{{- $a := .Values.ui.auth -}}
{{- $browser := eq (include "portreach.auth.browser.enabled" .) "true" -}}
{{- $api := eq (include "portreach.auth.api.enabled" .) "true" -}}
{{- /* allowedUsers is the global allowlist; it applies to both auth paths. */ -}}
{{- $auth := dict "allowedUsers" ($a.allowedUsers | default list) -}}
{{- if $browser -}}
{{- if not $a.providers -}}
{{- fail "ui.auth browser is enabled but ui.auth.providers is empty" -}}
{{- end -}}
{{- /* redirectURL is optional: empty selects host-derived callback mode. */ -}}
{{- $_ := set $auth "cookieKey" (printf "${%s}" $a.cookieKeyEnv) -}}
{{- with $a.redirectURL }}{{- $_ := set $auth "redirectURL" . -}}{{- end -}}
{{- with $a.allowedRedirectHosts }}{{- $_ := set $auth "allowedRedirectHosts" . -}}{{- end -}}
{{- with $a.forwardedHostHeader }}{{- $_ := set $auth "forwardedHostHeader" . -}}{{- end -}}
{{- with $a.forwardedProtoHeader }}{{- $_ := set $auth "forwardedProtoHeader" . -}}{{- end -}}
{{- with $a.cookieSecure }}{{- $_ := set $auth "cookieSecure" . -}}{{- end -}}
{{- $providers := list -}}
{{- range $a.providers -}}
  {{- $id := required "ui.auth.providers[].id is required" .id -}}
  {{- $type := required (printf "ui.auth.providers[%s].type is required" $id) .type -}}
  {{- $clientID := required (printf "ui.auth.providers[%s].clientID is required" $id) .clientID -}}
  {{- $p := dict
        "id" $id
        "type" $type
        "clientID" $clientID
        "clientSecret" (printf "${%s}" (include "portreach.auth.providerSecretEnv" (dict "provider" .))) -}}
  {{- with .displayName }}{{- $_ := set $p "displayName" . -}}{{- end -}}
  {{- with .baseURL }}{{- $_ := set $p "baseURL" . -}}{{- end -}}
  {{- with .allowedOrgs }}{{- $_ := set $p "allowedOrgs" . -}}{{- end -}}
  {{- with .allowedGroups }}{{- $_ := set $p "allowedGroups" . -}}{{- end -}}
  {{- with .groupMatch }}{{- $_ := set $p "groupMatch" . -}}{{- end -}}
  {{- with .issuer }}{{- $_ := set $p "issuer" . -}}{{- end -}}
  {{- with .scopes }}{{- $_ := set $p "scopes" . -}}{{- end -}}
  {{- with .usernameClaim }}{{- $_ := set $p "usernameClaim" . -}}{{- end -}}
  {{- with .groupsClaim }}{{- $_ := set $p "groupsClaim" . -}}{{- end -}}
  {{- with .hostedDomain }}{{- $_ := set $p "hostedDomain" . -}}{{- end -}}
  {{- $providers = append $providers $p -}}
{{- end -}}
{{- $_ := set $auth "providers" $providers -}}
{{- end -}}
{{- if $api -}}
{{- /* Bearer-token issuers for /api/*; matched by (issuer, audience). An empty
       list would render `api: []`, which the UI reads as api-disabled and leaves
       the endpoint open — so fail closed, mirroring the browser guard above. */ -}}
{{- if not ($a.api | default dict).entries -}}
{{- fail "ui.auth.api is enabled but ui.auth.api.entries is empty" -}}
{{- end -}}
{{- $entries := list -}}
{{- range (($a.api | default dict).entries | default list) -}}
  {{- $id := required "ui.auth.api.entries[].id is required" .id -}}
  {{- $issuer := required (printf "ui.auth.api.entries[%s].issuer is required" $id) .issuer -}}
  {{- $audience := required (printf "ui.auth.api.entries[%s].audience is required" $id) .audience -}}
  {{- $e := dict
        "id" $id
        "issuer" $issuer
        "audience" $audience -}}
  {{- with .type }}{{- $_ := set $e "type" . -}}{{- end -}}
  {{- with .usernameClaim }}{{- $_ := set $e "usernameClaim" . -}}{{- end -}}
  {{- with .groupsClaim }}{{- $_ := set $e "groupsClaim" . -}}{{- end -}}
  {{- with .groupMatch }}{{- $_ := set $e "groupMatch" . -}}{{- end -}}
  {{- with .allowedGroups }}{{- $_ := set $e "allowedGroups" . -}}{{- end -}}
  {{- with .allowedUsers }}{{- $_ := set $e "allowedUsers" . -}}{{- end -}}
  {{- $entries = append $entries $e -}}
{{- end -}}
{{- $_ := set $auth "api" $entries -}}
{{- end -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "portreach.ui.fullname" . }}-auth
  labels:
    {{- include "portreach.ui.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  auth.yaml: |
    {{- dict "auth" $auth | toYaml | nindent 4 }}
{{- end }}
