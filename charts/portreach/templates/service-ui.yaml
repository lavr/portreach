apiVersion: v1
kind: Service
metadata:
  name: {{ include "portreach.ui.fullname" . }}
  labels:
    {{- include "portreach.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  type: {{ .Values.ui.service.type }}
  ports:
    - port: {{ .Values.ui.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "portreach.ui.selectorLabels" . | nindent 4 }}
