{{- if and .Values.ui.enabled .Values.ui.service.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "portreach.ui.fullname" . }}
  labels:
    {{- include "portreach.ui.labels" . | nindent 4 }}
    {{- with .Values.ui.service.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- $annotations := merge (.Values.ui.service.annotations | default dict) (.Values.commonAnnotations | default dict) }}
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.ui.service.type }}
  ports:
    - name: http
      port: {{ .Values.ui.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "portreach.ui.selectorLabels" . | nindent 4 }}
{{- end }}
