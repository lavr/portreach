{{- if and .Values.ui.enabled .Values.ui.auth.enabled (not .Values.ui.auth.existingSecret) -}}
{{- $a := .Values.ui.auth -}}
{{- $hasProviderSecret := false -}}
{{- range $a.providers -}}
{{- if .clientSecret -}}
{{- $hasProviderSecret = true -}}
{{- end -}}
{{- end -}}
{{- if and $hasProviderSecret (not $a.cookieKey) -}}
{{- fail "ui.auth.cookieKey is required when any ui.auth.providers[].clientSecret is set" -}}
{{- end -}}
{{- if or $a.cookieKey $hasProviderSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "portreach.auth.secretName" . }}
  labels:
    {{- include "portreach.ui.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  {{ .Values.ui.auth.cookieKeySecretKey }}: {{ required "ui.auth.cookieKey is required when chart creates the auth Secret" $a.cookieKey | quote }}
  {{- range $provider := $a.providers }}
  {{- with $provider.clientSecret }}
  {{ include "portreach.auth.providerSecretKey" (dict "provider" $provider) }}: {{ . | quote }}
  {{- end }}
  {{- end }}
{{- end }}
{{- end }}
