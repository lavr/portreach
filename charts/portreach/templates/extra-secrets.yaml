{{- range $secret := .Values.extraSecrets }}
{{- $name := required "extraSecrets[].name is required" $secret.name }}
{{- if not (or $secret.data $secret.stringData) }}
{{- fail (printf "extraSecrets[%s] requires data or stringData" $name) }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "portreach.labels" $ | nindent 4 }}
    {{- with $secret.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- $annotations := merge ($secret.annotations | default dict) ($.Values.commonAnnotations | default dict) }}
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: {{ default "Opaque" $secret.type }}
{{- if hasKey $secret "immutable" }}
immutable: {{ $secret.immutable }}
{{- end }}
{{- with $secret.data }}
data:
  {{- tpl (toYaml .) $ | nindent 2 }}
{{- end }}
{{- with $secret.stringData }}
stringData:
  {{- tpl (toYaml .) $ | nindent 2 }}
{{- end }}
{{- end }}
