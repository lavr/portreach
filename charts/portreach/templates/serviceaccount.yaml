{{- if and .Values.ui.enabled .Values.serviceAccounts.ui.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "portreach.ui.serviceAccountName" . }}
  labels:
    {{- include "portreach.ui.labels" . | nindent 4 }}
  {{- $annotations := merge (.Values.serviceAccounts.ui.annotations | default dict) (.Values.commonAnnotations | default dict) }}
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccounts.ui.automountServiceAccountToken }}
---
{{- end }}
{{- if and .Values.agent.enabled .Values.serviceAccounts.agent.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "portreach.agent.serviceAccountName" . }}
  labels:
    {{- include "portreach.agent.labels" . | nindent 4 }}
  {{- $annotations := merge (.Values.serviceAccounts.agent.annotations | default dict) (.Values.commonAnnotations | default dict) }}
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccounts.agent.automountServiceAccountToken }}
{{- end }}
