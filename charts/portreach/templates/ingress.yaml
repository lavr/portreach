{{- if and .Values.ui.enabled .Values.ui.ingress.enabled -}}
{{- if not .Values.ui.service.enabled -}}
{{- fail "ui.ingress.enabled requires ui.service.enabled=true" -}}
{{- end -}}
{{- if not .Values.ui.ingress.hosts -}}
{{- fail "ui.ingress.enabled requires at least one ui.ingress.hosts entry" -}}
{{- end -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "portreach.ui.fullname" . }}
  labels:
    {{- include "portreach.ui.labels" . | nindent 4 }}
  {{- $annotations := merge (.Values.ui.ingress.annotations | default dict) (.Values.commonAnnotations | default dict) }}
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ui.ingress.className }}
  ingressClassName: {{ . | quote }}
  {{- end }}
  {{- with .Values.ui.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ui.ingress.hosts }}
    {{- $host := required "ui.ingress.hosts[].host is required" .host }}
    {{- if not .paths }}
    {{- fail (printf "ui.ingress.hosts[%s].paths must not be empty" $host) }}
    {{- end }}
    - host: {{ $host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ required (printf "ui.ingress.hosts[%s].paths[].path is required" $host) .path | quote }}
            pathType: {{ default "Prefix" .pathType | quote }}
            backend:
              service:
                name: {{ include "portreach.ui.fullname" $ }}
                port:
                  name: http
          {{- end }}
    {{- end }}
{{- end }}
