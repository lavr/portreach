{{- if .Values.agent.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "portreach.agent.fullname" . }}
  labels:
    {{- include "portreach.agent.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  updateStrategy:
    {{- toYaml .Values.agent.updateStrategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "portreach.agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "portreach.agent.selectorLabels" . | nindent 8 }}
        {{- with .Values.agent.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- $podAnnotations := merge (.Values.agent.podAnnotations | default dict) (.Values.commonAnnotations | default dict) }}
      {{- with include "portreach.agent.token.checksum" . }}
      {{- $_ := set $podAnnotations "checksum/agent-token" . }}
      {{- end }}
      {{- with $podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "portreach.agent.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccounts.agent.automountServiceAccountToken }}
      {{- if .Values.agent.network.hostNetwork }}
      hostNetwork: true
      dnsPolicy: {{ .Values.agent.network.dnsPolicy }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.agent.podSecurityContext | nindent 8 }}
      {{- with .Values.agent.initContainers }}
      initContainers:
        {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}
      containers:
        - name: agent
          image: {{ include "portreach.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - agent
            - --listen
            - ":{{ .Values.agent.port }}"
            {{- with .Values.agent.targetPolicy.allow }}
            - --allow
            - {{ . | quote }}
            {{- end }}
            {{- with .Values.agent.targetPolicy.deny }}
            - --deny
            - {{ . | quote }}
            {{- end }}
            {{- if .Values.agent.metricsPublic }}
            - --metrics-public
            {{- end }}
            {{- with .Values.agent.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.agent.port }}
              {{- if .Values.agent.network.hostPort.enabled }}
              hostPort: {{ .Values.agent.network.hostPort.port | default .Values.agent.port }}
              {{- end }}
              protocol: TCP
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            {{- if eq (include "portreach.agent.token.enabled" .) "true" }}
            - name: PORTREACH_AGENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "portreach.agent.token.secretName" . }}
                  key: {{ .Values.agent.auth.tokenSecretKey }}
            {{- end }}
            {{- with .Values.agent.extraEnv }}
            {{- tpl (toYaml .) $ | nindent 12 }}
            {{- end }}
          {{- with .Values.agent.envFrom }}
          envFrom:
            {{- tpl (toYaml .) $ | nindent 12 }}
          {{- end }}
          {{- with include "portreach.probe" .Values.agent.probes.startup }}
          startupProbe:
            {{- . | nindent 12 }}
          {{- end }}
          {{- with include "portreach.probe" .Values.agent.probes.liveness }}
          livenessProbe:
            {{- . | nindent 12 }}
          {{- end }}
          {{- with include "portreach.probe" .Values.agent.probes.readiness }}
          readinessProbe:
            {{- . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.agent.containerSecurityContext | nindent 12 }}
          {{- with .Values.agent.extraVolumeMounts }}
          volumeMounts:
            {{- tpl (toYaml .) $ | nindent 12 }}
          {{- end }}
        {{- with .Values.agent.sidecars }}
        {{- tpl (toYaml .) $ | nindent 8 }}
        {{- end }}
      {{- with .Values.agent.extraVolumes }}
      volumes:
        {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
