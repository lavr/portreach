apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "portreach.ui.fullname" . }}
  labels:
    {{- include "portreach.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  replicas: {{ .Values.ui.replicaCount }}
  selector:
    matchLabels:
      {{- include "portreach.ui.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "portreach.ui.selectorLabels" . | nindent 8 }}
        {{- with .Values.ui.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.ui.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "portreach.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
      containers:
        - name: ui
          image: {{ include "portreach.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - ui
            - --listen
            - ":{{ .Values.ui.port }}"
            - --timeout
            - {{ .Values.ui.timeout | quote }}
            {{- if .Values.ui.auth.enabled }}
            - --auth-config
            - /etc/portreach/auth/auth.yaml
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.ui.port }}
              protocol: TCP
          env:
            - name: PORTREACH_AGENTS_DNS
              value: {{ include "portreach.agent.dnsName" . | quote }}
            - name: PORTREACH_AGENT_PORT
              value: {{ .Values.agent.port | quote }}
            {{- if .Values.ui.auth.enabled }}
            {{- $secretName := .Values.ui.auth.existingSecret | default (printf "%s-auth" (include "portreach.ui.fullname" .)) }}
            - name: {{ .Values.ui.auth.cookieKeyEnv }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: {{ .Values.ui.auth.cookieKeySecretKey }}
            {{- range .Values.ui.auth.providers }}
            - name: {{ .clientSecretEnv }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: {{ .clientSecretKey }}
            {{- end }}
            {{- end }}
            {{- with .Values.ui.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          {{- if .Values.ui.auth.enabled }}
          volumeMounts:
            - name: auth-config
              mountPath: /etc/portreach/auth
              readOnly: true
          {{- end }}
      {{- if .Values.ui.auth.enabled }}
      volumes:
        - name: auth-config
          configMap:
            name: {{ include "portreach.ui.fullname" . }}-auth
      {{- end }}
      {{- with .Values.ui.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ui.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ui.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
