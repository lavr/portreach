{{- if .Values.ui.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "portreach.ui.fullname" . }}
  labels:
    {{- include "portreach.ui.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.ui.replicas }}
  revisionHistoryLimit: {{ .Values.ui.revisionHistoryLimit }}
  minReadySeconds: {{ .Values.ui.minReadySeconds }}
  strategy:
    {{- toYaml .Values.ui.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "portreach.ui.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "portreach.ui.selectorLabels" . | nindent 8 }}
        {{- with .Values.ui.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- $podAnnotations := merge (.Values.ui.podAnnotations | default dict) (.Values.commonAnnotations | default dict) }}
      {{- with $podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "portreach.ui.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccounts.ui.automountServiceAccountToken }}
      terminationGracePeriodSeconds: {{ .Values.ui.terminationGracePeriodSeconds }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ui.priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.ui.podSecurityContext | nindent 8 }}
      {{- with .Values.ui.initContainers }}
      initContainers:
        {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}
      containers:
        - name: ui
          image: {{ include "portreach.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - ui
            - --listen
            - ":{{ .Values.ui.port }}"
            - --timeout
            - {{ .Values.ui.timeout | quote }}
            {{- if .Values.ui.auth.enabled }}
            - --auth-config
            - /etc/portreach/auth/auth.yaml
            {{- end }}
            {{- with .Values.ui.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.ui.port }}
              protocol: TCP
          env:
            - name: PORTREACH_AGENTS_DNS
              value: {{ include "portreach.agent.dnsName" . | quote }}
            - name: PORTREACH_AGENT_PORT
              value: {{ .Values.agent.port | quote }}
            {{- if .Values.ui.auth.enabled }}
            {{- $secretName := include "portreach.auth.secretName" . }}
            - name: {{ .Values.ui.auth.cookieKeyEnv }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: {{ .Values.ui.auth.cookieKeySecretKey }}
            {{- range .Values.ui.auth.providers }}
            - name: {{ include "portreach.auth.providerSecretEnv" (dict "provider" .) }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: {{ include "portreach.auth.providerSecretKey" (dict "provider" .) }}
            {{- end }}
            {{- end }}
            {{- with .Values.ui.extraEnv }}
            {{- tpl (toYaml .) $ | nindent 12 }}
            {{- end }}
          {{- with .Values.ui.envFrom }}
          envFrom:
            {{- tpl (toYaml .) $ | nindent 12 }}
          {{- end }}
          {{- with include "portreach.probe" .Values.ui.probes.startup }}
          startupProbe:
            {{- . | nindent 12 }}
          {{- end }}
          {{- with include "portreach.probe" .Values.ui.probes.liveness }}
          livenessProbe:
            {{- . | nindent 12 }}
          {{- end }}
          {{- with include "portreach.probe" .Values.ui.probes.readiness }}
          readinessProbe:
            {{- . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.ui.containerSecurityContext | nindent 12 }}
          {{- if or .Values.ui.auth.enabled .Values.ui.extraVolumeMounts }}
          volumeMounts:
            {{- if .Values.ui.auth.enabled }}
            - name: auth-config
              mountPath: /etc/portreach/auth
              readOnly: true
            {{- end }}
            {{- with .Values.ui.extraVolumeMounts }}
            {{- tpl (toYaml .) $ | nindent 12 }}
            {{- end }}
          {{- end }}
        {{- with .Values.ui.sidecars }}
        {{- tpl (toYaml .) $ | nindent 8 }}
        {{- end }}
      {{- if or .Values.ui.auth.enabled .Values.ui.extraVolumes }}
      volumes:
        {{- if .Values.ui.auth.enabled }}
        - name: auth-config
          configMap:
            name: {{ include "portreach.ui.fullname" . }}-auth
        {{- end }}
        {{- with .Values.ui.extraVolumes }}
        {{- tpl (toYaml .) $ | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.ui.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ui.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ui.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ui.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}
{{- end }}
