nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/lavr/portreach
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
commonLabels: {}
commonAnnotations: {}

clusterDomain: cluster.local

serviceAccounts:
  ui:
    create: true
    name: ""
    annotations: {}
    automountServiceAccountToken: false
  agent:
    create: true
    name: ""
    annotations: {}
    automountServiceAccountToken: false

ui:
  enabled: true
  replicas: 2
  revisionHistoryLimit: 5
  minReadySeconds: 5
  terminationGracePeriodSeconds: 30
  port: 8080
  timeout: 8s
  extraArgs: []
  extraEnv: []
  envFrom: []

  agentDiscovery:
    dnsName: ""
    mode: relative

  service:
    enabled: true
    type: ClusterIP
    port: 80
    annotations: {}
    labels: {}

  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts: []
    tls: []

  auth:
    enabled: false
    # OAuth callback URL. Empty = host-derived mode: the redirect_uri is built
    # per request from the incoming host, so one deployment authenticates across
    # every ingress hostname (register each callback in the IdP app). Set a value
    # to pin a single fixed callback (one hostname).
    redirectURL: ""
    allowedUsers: []
    # Host-derived mode only (redirectURL empty). allowedRedirectHosts, when
    # non-empty, restricts the derived host to a known set (defence-in-depth on
    # top of the IdP's registered-callback check). forwardedHostHeader /
    # forwardedProtoHeader override the request headers the trusted proxy sets
    # (empty = X-Forwarded-Host / X-Forwarded-Proto defaults).
    allowedRedirectHosts: []
    forwardedHostHeader: ""
    forwardedProtoHeader: ""
    # Secure attribute on the auth cookies: "" (app default) = auto (Secure only
    # over https, so login works on both http and https); "always" requires
    # https; "never" is for deliberate http-only. Over plain http use auto/never.
    cookieSecure: ""
    existingSecret: ""
    cookieKey: ""
    cookieKeyEnv: PORTREACH_AUTH_COOKIE_KEY
    cookieKeySecretKey: cookieKey
    providers: []

  podDisruptionBudget:
    enabled: true
    maxUnavailable: 1

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  probes:
    liveness:
      enabled: true
      httpGet:
        path: /healthz
        port: http
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    readiness:
      enabled: true
      httpGet:
        path: /healthz
        port: http
      initialDelaySeconds: 2
      periodSeconds: 5
      timeoutSeconds: 2
      failureThreshold: 2
    startup:
      enabled: false

  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      memory: 64Mi

  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  priorityClassName: ""
  extraVolumes: []
  extraVolumeMounts: []
  initContainers: []
  sidecars: []

agent:
  enabled: true
  port: 8732
  extraArgs: []
  extraEnv: []
  envFrom: []

  targetPolicy:
    allow: ""
    deny: ""

  network:
    hostNetwork: true
    dnsPolicy: ClusterFirstWithHostNet
    hostPort:
      enabled: true
      port: ""

  service:
    enabled: true
    publishNotReadyAddresses: true
    annotations: {}
    labels: {}

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 10%

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  probes:
    liveness:
      enabled: true
      httpGet:
        path: /healthz
        port: http
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    readiness:
      enabled: true
      httpGet:
        path: /healthz
        port: http
      initialDelaySeconds: 2
      periodSeconds: 5
      timeoutSeconds: 2
      failureThreshold: 2
    startup:
      enabled: false

  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      memory: 64Mi

  podAnnotations: {}
  podLabels: {}
  nodeSelector:
    kubernetes.io/os: linux
  tolerations:
    - operator: Exists
  affinity: {}
  priorityClassName: ""
  extraVolumes: []
  extraVolumeMounts: []
  initContainers: []
  sidecars: []

networkPolicy:
  enabled: false
  ui:
    ingress: []
    extraEgress: []
  agent:
    extraIngress: []

extraSecrets: []
extraManifests: []
