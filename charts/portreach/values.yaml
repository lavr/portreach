nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/lavr/portreach
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
commonLabels: {}
commonAnnotations: {}

clusterDomain: cluster.local

serviceAccounts:
  ui:
    create: true
    name: ""
    annotations: {}
    automountServiceAccountToken: false
  agent:
    create: true
    name: ""
    annotations: {}
    automountServiceAccountToken: false

ui:
  enabled: true
  replicas: 2
  revisionHistoryLimit: 5
  minReadySeconds: 5
  terminationGracePeriodSeconds: 30
  port: 8080
  timeout: 8s
  extraArgs: []
  extraEnv: []
  envFrom: []

  branding:
    title: null
    description: null
    footer: null
  loginBranding:
    title: null
    header: null
    footer: null

  agentDiscovery:
    dnsName: ""
    mode: relative

  # Optional API rate limiter (off by default = unlimited, today's behaviour).
  # Gates /api/* per identity (authenticated user, else proxy-aware client IP),
  # per target (host:port), and a process-global bucket; over limit → 429 +
  # Retry-After. Each scope is off unless its rate is > 0 (burst must then be
  # >= 1). Behind an Ingress, set trustedProxies so per-IP keying is correct;
  # for per-user keying enable auth. maxAgentsPerCheck/maxConcurrentFanout bound
  # the per-check fan-out independently of the limiter (see below).
  rateLimit:
    enabled: false
    user:
      rate: 0
      burst: 0
    target:
      rate: 0
      burst: 0
    global:
      rate: 0
      burst: 0
    # 0 = unlimited: query every node (today's "from every node" promise). A
    # positive cap bounds agents queried per check (deterministic by address,
    # dropped agents reported). maxConcurrentFanout: 0 = unlimited goroutine-
    # per-agent; > 0 bounds concurrency through a worker pool.
    maxAgentsPerCheck: 0
    maxConcurrentFanout: 0

  # CIDRs/IPs of trusted proxies (Ingress/CNI egress). A forwarded client-IP
  # header is honoured for rate-limit keying only when RemoteAddr is one of
  # these; otherwise RemoteAddr is used. forwardedHeader overrides the header
  # (empty = X-Forwarded-For).
  trustedProxies: []
  forwardedHeader: ""

  service:
    enabled: true
    type: ClusterIP
    port: 80
    annotations: {}
    labels: {}

  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts: []
    tls: []

  auth:
    # Legacy master toggle. Honoured for back-compat as the *browser SSO* switch
    # (equivalent to browser.enabled: true). Prefer the explicit toggles below.
    enabled: false
    # Browser SSO (OAuth2/OIDC login + sealed-cookie session). Independent of the
    # API bearer path: enable either, both, or neither.
    browser:
      enabled: false
    # API bearer tokens on /api/* (Boundary A). Accepts IdP-issued JWT access
    # tokens, validated by the issuer's JWKS (iss + aud + exp + signature). Each
    # entry is matched to a token by its (issuer, audience) pair — both required
    # and unique across entries. OIDC/JWT only: GitHub and opaque tokens are
    # unsupported. No client secret is needed (JWKS verification is offline).
    api:
      enabled: false
      entries: []
      # - id: ci
      #   issuer: https://keycloak.corp/realms/main
      #   audience: portreach
      #   type: ""              # optional preset (e.g. gitlab) for claim fallbacks
      #   usernameClaim: ""     # default preferred_username (then sub)
      #   groupsClaim: ""       # default groups
      #   allowedGroups: []
      #   allowedUsers: []
      #   groupMatch: ""        # exact (default) or subtree
    # OAuth callback URL. Empty = host-derived mode: the redirect_uri is built
    # per request from the incoming host, so one deployment authenticates across
    # every ingress hostname (register each callback in the IdP app). Set a value
    # to pin a single fixed callback (one hostname).
    redirectURL: ""
    allowedUsers: []
    # Host-derived mode only (redirectURL empty). allowedRedirectHosts, when
    # non-empty, restricts the derived host to a known set (defence-in-depth on
    # top of the IdP's registered-callback check). forwardedHostHeader /
    # forwardedProtoHeader override the request headers the trusted proxy sets
    # (empty = X-Forwarded-Host / X-Forwarded-Proto defaults).
    allowedRedirectHosts: []
    forwardedHostHeader: ""
    forwardedProtoHeader: ""
    # Secure attribute on the auth cookies: "" (app default) = auto (Secure only
    # over https, so login works on both http and https); "always" requires
    # https; "never" is for deliberate http-only. Over plain http use auto/never.
    cookieSecure: ""
    existingSecret: ""
    cookieKey: ""
    cookieKeyEnv: PORTREACH_AUTH_COOKIE_KEY
    cookieKeySecretKey: cookieKey
    providers: []

  podDisruptionBudget:
    enabled: true
    maxUnavailable: 1

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  probes:
    liveness:
      enabled: true
      httpGet:
        path: /healthz
        port: http
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    readiness:
      enabled: true
      httpGet:
        path: /healthz
        port: http
      initialDelaySeconds: 2
      periodSeconds: 5
      timeoutSeconds: 2
      failureThreshold: 2
    startup:
      enabled: false

  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      memory: 64Mi

  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  priorityClassName: ""
  extraVolumes: []
  extraVolumeMounts: []
  initContainers: []
  sidecars: []

agent:
  enabled: true
  port: 8732
  extraArgs: []
  extraEnv: []
  envFrom: []

  targetPolicy:
    allow: ""
    deny: ""
    # Default-on connect guard refusing the whole IPv4 link-local range
    # (169.254.0.0/16 — covers AWS/GCP/Azure IMDS 169.254.169.254, ECS task
    # metadata 169.254.170.2, etc.) plus IPv6 fd00:ec2::254. Set true to opt
    # back in to probing link-local targets (renders --allow-metadata). The
    # operator deny list above is independent and always wins.
    allowMetadata: false

  # Optional /check rate limiter (off by default = unlimited). Defence-in-depth
  # for direct calls to an agent (reachable on the node under hostNetwork); the
  # UI fan-out already gates at the API. The agent carries no per-user identity,
  # so only the per-target (host:port) and process-global scopes apply.
  rateLimit:
    enabled: false
    target:
      rate: 0
      burst: 0
    global:
      rate: 0
      burst: 0

  # Shared bearer token (Boundary B). When set, the agent requires
  # `Authorization: Bearer <token>` on /check (and /metrics, unless metricsPublic)
  # and the UI sends it on every probe. Empty = open (today's behaviour). This is
  # the *primary* isolation boundary; NetworkPolicy is best-effort under
  # hostNetwork (see networkPolicy below). Generate with `openssl rand -hex 32`.
  auth:
    # Literal token. The chart renders a Secret and adds a checksum annotation so
    # a value change rolls both workloads. Mutually exclusive with existingSecret.
    token: ""
    # Reference an out-of-band Secret instead (rotation = manual rollout).
    existingSecret: ""
    # Key under which the token is stored in the Secret.
    tokenSecretKey: agent-token

  # Leave /metrics open for Prometheus even when a token is set (/check stays
  # gated). Relevant because hostNetwork exposes /metrics on the node.
  metricsPublic: false

  network:
    hostNetwork: true
    dnsPolicy: ClusterFirstWithHostNet
    hostPort:
      enabled: true
      port: ""

  service:
    enabled: true
    publishNotReadyAddresses: true
    annotations: {}
    labels: {}

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 10%

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  probes:
    liveness:
      enabled: true
      httpGet:
        path: /healthz
        port: http
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    readiness:
      enabled: true
      httpGet:
        path: /healthz
        port: http
      initialDelaySeconds: 2
      periodSeconds: 5
      timeoutSeconds: 2
      failureThreshold: 2
    startup:
      enabled: false

  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      memory: 64Mi

  podAnnotations: {}
  podLabels: {}
  nodeSelector:
    kubernetes.io/os: linux
  tolerations:
    - operator: Exists
  affinity: {}
  priorityClassName: ""
  extraVolumes: []
  extraVolumeMounts: []
  initContainers: []
  sidecars: []

networkPolicy:
  enabled: false
  ui:
    ingress: []
    extraEgress: []
  agent:
    extraIngress: []

extraSecrets: []
extraManifests: []
