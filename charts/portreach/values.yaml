image:
  repository: lavr/portreach
  # Single source of truth for the image tag.
  #   empty => defaults to the chart appVersion (plain alpine-based image);
  #   set   => used verbatim (e.g. "0.1.0", "sha-abc123", "latest").
  # The scratch-based distroless (rootless) image is opt-in:
  #   image.tag: "0.1.0-rootless"
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Cluster DNS domain. Used ONLY when ui.discovery.mode is "fqdn" to build the
# fully-qualified agent service name. Ignored in the default "relative" mode.
clusterDomain: cluster.local

serviceAccount:
  create: true
  name: ""
  annotations: {}

# UI: aggregator Deployment + web form.
ui:
  replicaCount: 1
  # Raw override for the agent discovery DNS name the UI resolves. Used verbatim
  # when non-empty (any FQDN, bare name, cross-namespace, or external name). Empty
  # => the name is built from ui.discovery.mode below.
  agentsDnsName: ""
  discovery:
    # How the agent discovery name is built when ui.agentsDnsName is empty:
    #   relative -> <svc>.<ns>.svc           (default; resolved via the pod search
    #               domain, so it is portable across any cluster DNS domain)
    #   fqdn     -> <svc>.<ns>.svc.<clusterDomain>  (pins the cluster domain)
    #   bare     -> <svc>                      (shortest; same-namespace only)
    mode: relative
  # Overall fan-out budget per check.
  timeout: 8s
  port: 8080
  service:
    type: ClusterIP
    port: 80
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts: []
      # - host: portreach.example.com
      #   paths:
      #     - path: /
      #       pathType: Prefix
    tls: []
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      memory: 64Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  podLabels: {}
  extraEnv: []
  # Optional multi-provider SSO authentication for the UI. Disabled by default:
  # with enabled=false the UI runs exactly as before (no login). When enabled,
  # the rendered auth config is mounted as a file and passed via --auth-config.
  #
  # Secrets are NEVER stored in values: the cookie key and each provider's
  # client secret are referenced from the config as ${ENV} placeholders and
  # injected into the container via secretKeyRef from `existingSecret`. Create
  # that Secret out-of-band, e.g.:
  #   kubectl create secret generic portreach-ui-auth \
  #     --from-literal=cookieKey="$(openssl rand -hex 32)" \
  #     --from-literal=githubClientSecret=... \
  #     --from-literal=gitlabClientSecret=...
  auth:
    enabled: false
    # OAuth callback URL (must match each provider's registered callback).
    redirectURL: ""
    # Optional global user-login allowlist. Empty = any authenticated user.
    allowedUsers: []
    # Name of an existing Secret holding cookieKey + each provider's client
    # secret (keys named below). Defaults to "<ui-fullname>-auth" if empty.
    existingSecret: ""
    # Cookie key: env var injected from the Secret and referenced in the config.
    cookieKeyEnv: PORTREACH_AUTH_COOKIE_KEY
    cookieKeySecretKey: cookieKey
    # Providers mirror internal/auth ProviderConfig. Each provider's client
    # secret is injected from `existingSecret` under `clientSecretKey` into the
    # env var `clientSecretEnv`, referenced from the config as ${clientSecretEnv}.
    #
    # Provider `type` is one of:
    #   github                       # OAuth2 + REST (github.com / Enterprise)
    #   oidc                         # generic OpenID Connect — set `issuer`
    #   gitlab | google | entra | okta | keycloak   # presets that expand to oidc
    #
    # OIDC fields (apply to `oidc` and the presets; all optional, presets supply
    # sensible defaults that any explicit value here overrides):
    #   issuer                       # OIDC issuer URL (discovery base); required for type: oidc
    #   scopes                       # OAuth2 scopes; default [openid, profile, email]
    #   usernameClaim                # id_token claim → login (default preferred_username, then sub)
    #   groupsClaim                  # id_token claim → groups (default groups)
    #   hostedDomain                 # Google Workspace `hd` restriction (google preset only)
    providers: []
      # - id: github
      #   type: github                 # github | oidc | gitlab|google|entra|okta|keycloak
      #   displayName: GitHub          # optional; defaults per type
      #   baseURL: ""                  # optional; self-hosted/Enterprise base URL
      #   clientID: "abc"
      #   clientSecretEnv: GITHUB_CLIENT_SECRET
      #   clientSecretKey: githubClientSecret
      #   allowedOrgs: [myorg]
      #   allowedGroups: []
      # - id: corp-gitlab
      #   type: gitlab
      #   displayName: "Corporate GitLab"
      #   baseURL: https://gitlab.corp
      #   clientID: "def"
      #   clientSecretEnv: GITLAB_CLIENT_SECRET
      #   clientSecretKey: gitlabClientSecret
      #   allowedGroups: [infra, sre]
      # - id: keycloak
      #   type: oidc                   # generic OIDC: any standards-compliant IdP
      #   displayName: "Corporate SSO"
      #   issuer: https://keycloak.corp/realms/main
      #   clientID: portreach
      #   clientSecretEnv: OIDC_CLIENT_SECRET
      #   clientSecretKey: oidcClientSecret
      #   groupsClaim: groups          # default already `groups`; override if needed
      #   allowedGroups: [sre, infra]
      # - id: google
      #   type: google                 # preset: accounts.google.com
      #   displayName: "Google"
      #   clientID: "ghi"
      #   clientSecretEnv: GOOGLE_CLIENT_SECRET
      #   clientSecretKey: googleClientSecret
      #   hostedDomain: corp.com       # only this Google Workspace domain may sign in
      #   # Google has no group claim — gate access by hostedDomain and/or the
      #   # global ui.auth.allowedUsers (emails), not allowedGroups.
      # - id: entra
      #   type: entra                  # preset: login.microsoftonline.com/<tenant>/v2.0
      #   displayName: "Microsoft"
      #   baseURL: "<tenant-id>"       # Entra tenant id (or full issuer URL)
      #   clientID: "jkl"
      #   clientSecretEnv: ENTRA_CLIENT_SECRET
      #   clientSecretKey: entraClientSecret
      #   allowedGroups: ["<group-object-id>"]  # Entra emits group object IDs

# Agent: per-node probe DaemonSet on hostNetwork.
agent:
  hostNetwork: true
  port: 8732
  # Optional target policy (SSRF mitigation). Empty allow = allow all.
  allow: ""
  deny: ""
  # Run an agent on every node, including tainted ones (control-plane etc.).
  tolerations:
    - operator: Exists
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      memory: 64Mi
  nodeSelector: {}
  affinity: {}
  podAnnotations: {}
  podLabels: {}
  extraEnv: []
