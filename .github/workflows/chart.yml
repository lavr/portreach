name: Helm Chart

on:
  push:
    tags:
      - "chart-*"
    branches:
      - main
      - master
    paths:
      - "charts/**"
  pull_request:
    paths:
      - "charts/**"

permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Lint chart
        run: helm lint charts/portreach

  publish:
    if: startsWith(github.ref, 'refs/tags/chart-')
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Log in to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package chart
        run: helm package charts/portreach

      - name: Push to OCI registry
        run: helm push portreach-*.tgz oci://ghcr.io/lavr/charts
